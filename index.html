<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveLab OS | Enterprise Suite v9.1</title>
    
    <!-- Dependencias Estables -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            /* PALETA APPLE */
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-orange: #FF9500;
            --apple-red: #FF3B30;
            --apple-bg: #F5F5F7; 
            --apple-card: rgba(255, 255, 255, 0.95);
            --apple-text-main: #1D1D1F;
            --apple-text-muted: #86868B;
            --apple-border: rgba(0, 0, 0, 0.05);
            --apple-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--apple-card);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--apple-border);
            box-shadow: var(--apple-shadow);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #1D1D1F, #86868B, #1D1D1F);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .glass-input {
            background: rgba(0,0,0,0.03); border: 1px solid transparent; color: var(--apple-text-main);
            outline: none; transition: all 0.2s ease; font-size: 0.875rem; 
        }
        .glass-input:focus { border-color: var(--apple-blue); background: #fff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); }
        .glass-input::placeholder { color: var(--apple-text-muted); }
        
        .price-input-table { background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.1); color: var(--apple-blue); text-align: right; width: 100px; font-weight: 700; outline: none; padding: 2px 4px; }
        .price-input-table:focus { border-bottom-color: var(--apple-blue); }
        .name-input-table { background: transparent; border: none; color: var(--apple-text-main); width: 100%; font-weight: 600; outline: none; border-bottom: 1px dashed rgba(0,0,0,0.2); transition: border 0.2s; padding: 2px 0; }
        .name-input-table:focus { border-bottom: 1px dashed var(--apple-blue); color: var(--apple-blue); }

        .price-table th { text-align: left; padding: 12px; color: var(--apple-text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .price-table td { padding: 12px; font-size: 14px; font-weight: 500; border-bottom: 1px solid rgba(0,0,0,0.02); color: var(--apple-text-main); }
        .price-table tr:last-child td { border-bottom: none; }
        
        .ai-chat-bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.4; font-weight: 400; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .ai-bot { background: #E9E9EB; color: #000; border-bottom-left-radius: 4px; }
        .ai-user { background: var(--apple-blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Estilo para Finanzas (Wallet Style) */
        .wallet-card {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f5 100%);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,1);
            position: relative;
            overflow: hidden;
        }
        .wallet-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 60%);
            opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; background:#F5F5F7;">
            <div style="width:40px; height:40px; border:3px solid #007AFF; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
            <p style="color:#86868B; margin-top:20px; font-size:12px; letter-spacing:3px; font-weight:600; text-transform:uppercase;">Iniciando DriveLab OS v9.1</p>
        </div>
    </div>

    <script type="text/babel">
        if (typeof window.React === 'undefined') throw new Error("Motor React no cargó correctamente.");

        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.FramerMotion || { motion: { div: 'div' }, AnimatePresence: ({children}) => children };
        
        const FallbackIcon = ({ size = 16, className = "" }) => <span className={`inline-block rounded-full bg-black/5 border border-black/10 ${className}`} style={{ width: size, height: size }}></span>;

        const { 
            Zap=FallbackIcon, Plus=FallbackIcon, Search=FallbackIcon, TrendingUp=FallbackIcon, Target=FallbackIcon, ArrowUpRight=FallbackIcon, 
            DollarSign=FallbackIcon, X=FallbackIcon, Calculator=FallbackIcon, Save=FallbackIcon, Trash2=FallbackIcon, 
            Archive=FallbackIcon, FileText=FallbackIcon, Settings=FallbackIcon, Wrench=FallbackIcon, Sparkles=FallbackIcon, 
            Check=FallbackIcon, LayoutDashboard=FallbackIcon, BrainCircuit=FallbackIcon, PieChart=FallbackIcon, Send=FallbackIcon, Activity=FallbackIcon,
            BarChart=FallbackIcon, ArrowRight=FallbackIcon, Layers=FallbackIcon, ShieldCheck=FallbackIcon, Clock=FallbackIcon, CheckCircle2=FallbackIcon, Car=FallbackIcon, MessageSquare=FallbackIcon, Info=FallbackIcon, Receipt=FallbackIcon, ChevronDown=FallbackIcon, ChevronUp=FallbackIcon, Calendar=FallbackIcon, Scale=FallbackIcon, ArrowDownCircle=FallbackIcon, ArrowUpCircle=FallbackIcon
        } = window.lucideReact || {};

        const GlassCard = ({ children, className = "", onClick, noHover = false }) => (
            <motion.div 
                whileHover={noHover ? {} : { scale: 1.01, boxShadow: "0 8px 30px rgba(0,0,0,0.06)" }}
                whileTap={noHover ? {} : { scale: 0.98 }}
                onClick={onClick}
                className={`glass-panel rounded-[2rem] overflow-hidden relative transition-all duration-300 ${className}`}
            >
                {children}
            </motion.div>
        );

        const Badge = ({ children, color = "blue", className="" }) => {
            const colors = {
                blue: "bg-[#007AFF]/10 text-[#007AFF]", green: "bg-[#34C759]/10 text-[#34C759]",
                orange: "bg-[#FF9500]/10 text-[#FF9500]", red: "bg-[#FF3B30]/10 text-[#FF3B30]",
                zinc: "bg-[#86868B]/10 text-[#86868B]", purple: "bg-[#AF52DE]/10 text-[#AF52DE]",
                teal: "bg-teal-500/10 text-teal-600"
            };
            return <span className={`text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wide ${colors[color]} ${className}`}>{children}</span>;
        };

        const formatCLP = (num) => {
            if (num === null || num === undefined) return "";
            const cleanNum = num.toString().replace(/\D/g, ''); 
            if (!cleanNum) return "";
            return "$" + cleanNum.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const CurrencyInput = ({ value, onChange, placeholder, className }) => {
            const [display, setDisplay] = useState(value ? formatCLP(value) : "");
            useEffect(() => { setDisplay(value ? formatCLP(value) : ""); }, [value]);
            const handleChange = (e) => {
                let raw = e.target.value.replace(/\D/g, '');
                setDisplay(raw ? formatCLP(raw) : "");
                onChange(raw ? Number(raw) : 0);
            };
            return <input type="text" value={display} onChange={handleChange} placeholder={placeholder} className={className} />;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [inventory, setInventory] = useState([]);
            const [history, setHistory] = useState([]);
            const [selectedHistoryItem, setSelectedHistoryItem] = useState(null);
            
            const [marketPrices, setMarketPrices] = useState([{id: 1, val: ""}]);
            const [prm, setPrm] = useState(0);
            const [marketCar, setMarketCar] = useState({ marca: "", modelo: "", año: "", precio_compra: 0, repairs: {} });
            const prmRef = useRef(null); 

            // PARÁMETROS UNIVERSAL
            const [reparaciones, setReparaciones] = useState({
                gastos_legales: [
                    { id: 'leg_1', nombre: 'Transferencia e Impuestos (%)', valor: 1.5, tipo: 'porcentaje_compra' },
                    { id: 'leg_2', nombre: 'Trámite Notarial', valor: 25000, tipo: 'booleano' },
                    { id: 'leg_3', nombre: 'Marketing y Publicación', valor: 15000, tipo: 'booleano' },
                    { id: 'leg_4', nombre: 'Reserva para Imprevistos (%)', valor: 5, tipo: 'porcentaje_compra' }
                ],
                estetica: [
                    { id: 'est_1', nombre: 'Pintura (Por Pieza)', valor: 80000, tipo: 'unidad' },
                    { id: 'est_2', nombre: 'Detailing Full Premium', valor: 120000, tipo: 'booleano' },
                    { id: 'est_3', nombre: 'Limpieza Profunda Tapiz', valor: 60000, tipo: 'booleano' },
                    { id: 'est_4', nombre: 'Pulido y Sellado Focos', valor: 35000, tipo: 'booleano' },
                    { id: 'est_5', nombre: 'Restauración Llantas (x4)', valor: 90000, tipo: 'booleano' },
                    { id: 'est_6', nombre: 'Desabolladura PDR (Unidad)', valor: 45000, tipo: 'unidad' }
                ],
                mecanica_rapida: [
                    { id: 'mec_1', nombre: 'Kit Aceite y Filtros (Full)', valor: 75000, tipo: 'booleano' },
                    { id: 'mec_2', nombre: 'Neumáticos Nuevos (Par)', valor: 120000, tipo: 'unidad' },
                    { id: 'mec_3', nombre: 'Pastillas Freno (Del/Tra)', valor: 85000, tipo: 'booleano' },
                    { id: 'mec_4', nombre: 'Batería Nueva', valor: 75000, tipo: 'booleano' }
                ],
                mecanica_mayor: [
                    { id: 'may_1', nombre: 'Kit Distribución Completo', valor: 180000, tipo: 'booleano' },
                    { id: 'may_2', nombre: 'Kit Embrague', valor: 250000, tipo: 'booleano' },
                    { id: 'may_3', nombre: 'Amortiguadores (Par)', valor: 140000, tipo: 'unidad' }
                ]
            });

            const [isSavingConfig, setIsSavingConfig] = useState(false);
            
            // ESTADO PARA CIERRE MANUAL
            const [saleModal, setSaleModal] = useState({ isOpen: false, vehicle: null, price: 0 });
            const [gastosManuales, setGastosManuales] = useState([]);

            const [deleteModal, setDeleteModal] = useState({ isOpen: false, id: null, title: "" });
            const [isAdding, setIsAdding] = useState(false);
            const [isClosing, setIsClosing] = useState(false);
            const [closingData, setClosingData] = useState(null);

            const [newVeh, setNewVeh] = useState({ 
                marca: "", modelo: "", año: "", patente: "", precio_compra: 0, 
                estado: "En revisión", repairs: {},
                fecha_ingreso: new Date().toISOString().split('T')[0]
            });

            const [aiOpen, setAiOpen] = useState(false);
            const [aiInput, setAiInput] = useState("");
            const [aiMessages, setAiMessages] = useState([{ role: 'ai', text: 'Asistente DriveLab en línea. ¿En qué te ayudo hoy?' }]);
            const chatEndRef = useRef(null);

            // FILTROS FINANCIEROS
            const [filterMonth, setFilterMonth] = useState(new Date().getMonth());
            const [filterYear, setFilterYear] = useState(new Date().getFullYear());
            const [filterMode, setFilterMode] = useState('month'); 
            const [filterDateStart, setFilterDateStart] = useState('');
            const [filterDateEnd, setFilterDateEnd] = useState('');

            useEffect(() => {
                if (inventory.length === 0) {
                    setInventory([
                        { id: 'demo-1', marca: 'Chevrolet', modelo: 'Corsa', año: 2004, patente: 'DRIVE-01', rank: 'A', estado: 'En visita', precio_compra: 1400000, 
                          desglose_costos: { rep: 80000, leg: 46000, imp: 70000, mkt: 15000, total: 211000 }, costos_estimados: 211000, fecha_ingreso: new Date(Date.now() - 432000000).toISOString() },
                        { id: 'demo-2', marca: 'Kia', modelo: 'Morning', año: 2012, patente: 'LABOS-22', rank: 'S', estado: 'Aceptado', precio_compra: 2800000, 
                          desglose_costos: { rep: 120000, leg: 67000, imp: 140000, mkt: 15000, total: 342000 }, costos_estimados: 342000, fecha_ingreso: new Date(Date.now() - 1500000000).toISOString() }
                    ]);
                }
                if (history.length === 0) {
                    setHistory([
                        { 
                          id: 'hist-1', marca: 'Suzuki', modelo: 'Swift', año: 2015, patente: 'SWFT-55', 
                          precio_compra: 4500000, precio_venta: 5800000, 
                          gastos_reales: 4757500, utilidad_bruta: 1042500, reserva_imprevistos: 225000, 
                          utilidad_neta: 654000, fondo_ops: 163500, fecha_venta: new Date().toISOString(),
                          detalle_gastos: [
                              { id: 1, nombre: "Compra Vehículo", monto: 4500000 },
                              { id: 2, nombre: "Transferencia e Impuestos", monto: 67500 },
                              { id: 3, nombre: "Trámite Notarial", monto: 25000 },
                              { id: 4, nombre: "Detailing", monto: 120000 },
                              { id: 5, nombre: "Batería Nueva", monto: 45000 }
                          ]
                        }
                    ]);
                }
            }, []);

            const handleReparacionChange = (categoria, id, campo, valor) => {
                setReparaciones(prev => {
                    const newCat = prev[categoria].map(item => item.id === id ? { ...item, [campo]: valor } : item);
                    return { ...prev, [categoria]: newCat };
                });
            };
            const addReparacion = (categoria) => {
                const newId = categoria.substring(0,3) + '_' + Math.random().toString(36).substr(2, 5);
                setReparaciones(prev => ({ ...prev, [categoria]: [...prev[categoria], { id: newId, nombre: 'Nuevo Parámetro', valor: 0, tipo: 'booleano' }] }));
            };
            const removeReparacion = (categoria, id) => setReparaciones(prev => ({ ...prev, [categoria]: prev[categoria].filter(item => item.id !== id) }));
            const saveConfigToDB = () => { setIsSavingConfig(true); setTimeout(() => setIsSavingConfig(false), 1000); };

            const addMarketSample = () => setMarketPrices([...marketPrices, { id: Date.now(), val: "" }]);
            const removeMarketSample = (id) => setMarketPrices(marketPrices.filter(p => p.id !== id));
            const updateMarketSample = (id, val) => setMarketPrices(marketPrices.map(p => p.id === id ? { ...p, val } : p));
            
            const runMarketAnalysis = () => {
                const validPrices = marketPrices.map(p => Number(p.val)).filter(p => p > 0);
                if (validPrices.length < 2) return;
                validPrices.sort((a,b) => a - b);
                const clean = validPrices.length > 2 ? validPrices.slice(1, -1) : validPrices;
                setPrm(Math.round((clean.reduce((a,b)=>a+b,0) / clean.length) / 1000) * 1000);
                prmRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            
            const handleMarketRepairCheck = (id, type, val) => setMarketCar(prev => ({ ...prev, repairs: { ...prev.repairs, [id]: val } }));
            
            const calcularCostos = (precioCompra, repairsChecked) => {
                let costosCat = { legales: 0, estetica: 0, mecanica: 0, imprevistos_reserva: 0 };
                const pc = precioCompra || 0;

                Object.keys(reparaciones).forEach(cat => {
                    reparaciones[cat].forEach(item => {
                        let monto = 0;
                        if (item.tipo === 'porcentaje_compra') {
                            monto = pc * (item.valor / 100);
                        } else if (item.tipo === 'unidad') {
                            monto = item.valor * (repairsChecked[item.id] || 0);
                        } else {
                            monto = repairsChecked[item.id] ? item.valor : 0;
                        }

                        if (cat === 'gastos_legales') {
                            if (item.nombre.toLowerCase().includes('imprevistos')) costosCat.imprevistos_reserva += monto;
                            else if (item.tipo === 'porcentaje_compra' || repairsChecked[item.id]) costosCat.legales += monto;
                        } else if (cat === 'estetica') {
                            costosCat.estetica += monto;
                        } else {
                            costosCat.mecanica += monto;
                        }
                    });
                });

                const totalReparaciones = costosCat.estetica + costosCat.mecanica;
                const totalGastosEfectivos = costosCat.legales + totalReparaciones; 
                const costoTotalProyectado = pc + totalGastosEfectivos + costosCat.imprevistos_reserva;

                return { ...costosCat, totalReparaciones, totalGastosEfectivos, costoTotalProyectado };
            };

            const mktSim = calcularCostos(marketCar.precio_compra, marketCar.repairs);
            const mktMargen = prm > 0 ? prm - mktSim.costoTotalProyectado : 0;
            const mktRoi = mktSim.costoTotalProyectado > 0 ? ((mktMargen / mktSim.costoTotalProyectado) * 100).toFixed(1) : 0;

            const handleRepairCheck = (id, type, val) => setNewVeh(prev => ({ ...prev, repairs: { ...prev.repairs, [id]: val } }));
            
            const handleAddVehicle = () => {
                if(!newVeh.marca || !newVeh.precio_compra) return;
                setIsAdding(false);
                const calc = calcularCostos(newVeh.precio_compra, newVeh.repairs);
                
                let preGastos = [{ id: 'g_compra', nombre: 'Compra Vehículo', monto: Number(newVeh.precio_compra) }];
                Object.keys(reparaciones).forEach(cat => {
                    reparaciones[cat].forEach(item => {
                        if (cat === 'gastos_legales' && item.nombre.toLowerCase().includes('imprevistos')) return; 
                        
                        let m = 0;
                        if (item.tipo === 'porcentaje_compra') m = newVeh.precio_compra * (item.valor / 100);
                        else if (item.tipo === 'unidad' && newVeh.repairs[item.id]) m = item.valor * newVeh.repairs[item.id];
                        else if (newVeh.repairs[item.id]) m = item.valor;

                        if (m > 0) preGastos.push({ id: 'g_' + Math.random().toString(36).substring(7), nombre: item.nombre, monto: m });
                    });
                });

                const fechaIngresoISO = newVeh.fecha_ingreso ? new Date(newVeh.fecha_ingreso).toISOString() : new Date().toISOString();

                const newObj = {
                    id: 'veh-' + Math.random().toString(36).substr(2, 9),
                    ...newVeh, rank: 'S', 
                    desglose_costos: calc, 
                    costos_estimados: calc.totalGastosEfectivos,
                    pre_gastos: preGastos, 
                    fecha_ingreso: fechaIngresoISO
                };
                setInventory([...inventory, newObj]);
                setNewVeh({ 
                    marca: "", modelo: "", año: "", patente: "", precio_compra: 0, 
                    estado: "En revisión", repairs: {}, fecha_ingreso: new Date().toISOString().split('T')[0] 
                });
            };

            const openSaleModal = (vehicle) => {
                const list = vehicle.pre_gastos || [
                    { id: 'g_compra', nombre: 'Compra Vehículo', monto: vehicle.precio_compra },
                    { id: 'g_est', nombre: 'Reparaciones y Otros (Est)', monto: vehicle.costos_estimados }
                ];
                setGastosManuales([...list]);
                setSaleModal({ isOpen: true, vehicle, price: "" });
            };

            const addGastoManual = () => setGastosManuales([...gastosManuales, { id: Date.now().toString(), nombre: '', monto: 0 }]);
            const updateGastoManual = (id, campo, valor) => setGastosManuales(gastosManuales.map(g => g.id === id ? { ...g, [campo]: valor } : g));
            const removeGastoManual = (id) => setGastosManuales(gastosManuales.filter(g => g.id !== id));

            const handleLiquidationSubmit = () => {
                const v = saleModal.vehicle;
                const pVenta = saleModal.price;
                
                const gastosRealesTotales = gastosManuales.reduce((acc, g) => acc + Number(g.monto), 0);
                const utilidadBruta = pVenta - gastosRealesTotales;
                
                let pctImprevistos = 5;
                const paramImp = reparaciones.gastos_legales.find(i => i.nombre.toLowerCase().includes('imprevistos'));
                if(paramImp) pctImprevistos = paramImp.valor;
                
                const reservaImprevistos = (v.precio_compra * (pctImprevistos / 100));
                const utilidadPostImprevistos = utilidadBruta - reservaImprevistos;

                let fondoLibre20 = 0;
                let utilidadNeta = 0;
                
                if (utilidadPostImprevistos > 0) {
                    fondoLibre20 = utilidadPostImprevistos * 0.20; 
                    utilidadNeta = utilidadPostImprevistos * 0.80; 
                }

                const soldVehicle = { 
                    ...v, 
                    precio_venta: pVenta, 
                    gastos_reales: gastosRealesTotales,
                    detalle_gastos: gastosManuales, 
                    utilidad_bruta: utilidadBruta,
                    reserva_imprevistos: reservaImprevistos,
                    fondo_ops: fondoLibre20, 
                    utilidad_neta: utilidadNeta, 
                    fecha_venta: new Date().toISOString() 
                };
                
                setHistory(prev => [soldVehicle, ...prev]);
                setInventory(prev => prev.filter(item => item.id !== v.id));

                setClosingData({ utilidad_neta: utilidadNeta, fondo_ops: fondoLibre20, bruto: utilidadBruta });
                setSaleModal({ isOpen: false, vehicle: null, price: 0 });
                setIsClosing(true);
                setTimeout(() => setIsClosing(false), 5000);
            };

            const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            useEffect(() => { if(aiOpen) scrollToBottom(); }, [aiMessages, aiOpen]);
            const handleAiSubmit = (e) => {
                e.preventDefault();
                if(!aiInput.trim()) return;
                const newMsgs = [...aiMessages, { role: 'user', text: aiInput }];
                setAiMessages(newMsgs);
                setAiInput("");
                setTimeout(() => setAiMessages([...newMsgs, { role: 'ai', text: "Entendido. La estrategia se actualizó correctamente." }]), 800);
            };

            const calcDays = (d) => Math.ceil(Math.abs(new Date() - new Date(d)) / (1000 * 60 * 60 * 24)) || 0;
            const formatDate = (d) => { const x = new Date(d); return `${x.getDate()}/${x.getMonth()+1}/${x.getFullYear()}`; };

                                                            />
                                                        </div>
                                                        <button onClick={() => removeGastoManual(gasto.id)} className="w-8 h-8 rounded-lg bg-[#FF3B30]/10 text-[#FF3B30] flex items-center justify-center hover:bg-[#FF3B30] hover:text-white transition-colors"><Trash2 size={14}/></button>
                                                    </div>
                                                ))}
                                                {gastosManuales.length === 0 && <p className="text-xs text-center text-[#86868B] py-4">No hay gastos registrados. Añade al menos la compra.</p>}
                                                
                                                <div className="flex justify-between items-center px-4 pt-3 mt-2 border-t border-black/10">
                                                    <span className="text-xs font-black text-[#1D1D1F] uppercase tracking-widest">Total Gastos:</span>
                                                    <span className="text-lg font-black text-[#FF3B30]">{formatCLP(gastosManuales.reduce((acc, g) => acc + Number(g.monto), 0))}</span>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                    
                                    <div className="flex-shrink-0 pt-4 border-t border-black/5">
                                        <button onClick={handleLiquidationSubmit} className="w-full py-5 bg-[#1D1D1F] rounded-2xl font-black text-sm uppercase tracking-widest text-white hover:bg-[#000] shadow-xl transition-all flex justify-center items-center gap-2">Liquidar Operación <CheckCircle2 size={18}/></button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* OVERLAY MAGIC BOX (CIERRE FINAL) */}
                    <AnimatePresence>
                        {isClosing && closingData && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[120] bg-white/95 backdrop-blur-xl flex items-center justify-center p-6">
                                <div className="max-w-4xl w-full text-center">
                                    <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }}>
                                        <div className="w-28 h-28 bg-[#007AFF] rounded-[2rem] mx-auto flex items-center justify-center shadow-xl mb-8 relative">
                                            <Calculator size={48} className="text-white" />
                                        </div>
                                        <h2 className="text-5xl font-black mb-3 text-[#1D1D1F] tracking-tight">Liquidación Procesada</h2>
                                        <p className="text-[#86868B] font-bold tracking-widest uppercase text-xs">Distribuyendo fondos a tus cuentas...</p>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12">
                                            <GlassCard className="p-8 rounded-[2rem] text-left bg-[#F5F5F7] border-none" noHover>
                                                <p className="text-[#86868B] text-[10px] font-black uppercase mb-2 tracking-widest">Margen Bruto</p>
                                                <p className="text-4xl font-black text-[#1D1D1F]">{formatCLP(closingData.bruto)}</p>
                                            </GlassCard>
                                            <GlassCard className="p-8 rounded-[2rem] text-left bg-[#007AFF]/5 border border-[#007AFF]/10" noHover>
                                                <p className="text-[#007AFF] text-[10px] font-black uppercase mb-2 tracking-widest">Fondo Libre (Ops)</p>
                                                <p className="text-4xl font-black text-[#007AFF]">{formatCLP(closingData.fondo_ops)}</p>
                                            </GlassCard>
                                            <GlassCard className="p-8 rounded-[2rem] text-left bg-[#34C759] shadow-xl transform scale-105 border-none" noHover>
                                                <p className="text-white/80 text-[10px] font-black uppercase mb-2 tracking-widest">Directo a tu Bolsillo</p>
                                                <p className="text-4xl font-black text-white">{formatCLP(closingData.utilidad_neta)}</p>
                                            </GlassCard>
                                        </div>
                                    </motion.div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                    
                    {/* BOTÓN FLOTANTE AI */}
                    <button onClick={() => setAiOpen(!aiOpen)} className="fixed bottom-8 right-8 z-[60] w-14 h-14 rounded-full bg-[#1D1D1F] text-white flex items-center justify-center shadow-2xl hover:scale-105 transition-transform">
                        {aiOpen ? <X size={24} /> : <MessageSquare size={24} />}
                    </button>
                    <AnimatePresence>
                        {aiOpen && (
                            <motion.div initial={{ opacity: 0, y: 20, scale: 0.95 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 20, scale: 0.95 }} className="fixed bottom-24 right-8 w-full max-w-[360px] z-[60] pointer-events-auto">
                                <div className="glass-panel rounded-3xl bg-white shadow-2xl flex flex-col overflow-hidden h-[500px] border border-black/5">
                                    <div className="p-4 border-b border-black/5 flex items-center gap-2 bg-[#F5F5F7]">
                                        <div className="w-2.5 h-2.5 bg-[#007AFF] rounded-full"></div>
                                        <span className="text-[10px] font-bold uppercase tracking-widest text-[#86868B]">Asistente DriveLab</span>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-5 space-y-4 flex flex-col custom-scroll">
                                        {aiMessages.map((m, i) => (
                                            <div key={i} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                                                <div className={`ai-chat-bubble ${m.role === 'user' ? 'ai-user' : 'ai-bot'}`}>{m.text}</div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>
                                    <div className="p-3 border-t border-black/5 bg-white">
                                        <form onSubmit={handleAiSubmit} className="flex items-center gap-2">
                                            <input type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)} placeholder="iMessage" className="bg-white border border-black/10 rounded-full px-4 outline-none w-full text-sm font-medium text-[#1D1D1F] placeholder:text-[#86868B] h-10 focus:border-[#007AFF]" />
                                            <button type="submit" className="w-10 h-10 rounded-full bg-[#007AFF] text-white flex items-center justify-center flex-shrink-0"><ArrowUpRight size={18}/></button>
                                        </form>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
